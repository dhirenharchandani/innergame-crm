<!-- Content Security Policy — lock down where scripts/styles/connections are allowed to come from.
     Notes:
     - 'unsafe-inline' is allowed only for style-src because React inline style={{...}} attributes are everywhere. Script inline is NOT allowed.
     - 'unsafe-eval' is NOT allowed (we precompile JSX so Babel is gone).
     - frame-ancestors can't be enforced via <meta> (needs an HTTP header) \u2014 noted as a limitation; GitHub Pages won't let us set it.
     - Update this when adding a new CDN or backend service. -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://browser.sentry-cdn.com;
  connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.ingest.us.sentry.io https://*.ingest.sentry.io;
  img-src 'self' data: https:;
  style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com;
  font-src 'self' https://fonts.gstatic.com data:;
  worker-src 'self' blob:;
  manifest-src 'self' data:;
  object-src 'none';
  base-uri 'self';
  form-action 'self';
">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  /* ─── CSS Custom Properties (Light Theme) ─── */
  :root {
    --bg-primary: #f8fafc; --bg-secondary: #ffffff; --bg-tertiary: #f1f5f9;
    --bg-hover: #f1f5f9; --bg-active: #e2e8f0;
    --text-primary: #0f172a; --text-secondary: #475569; --text-tertiary: #94a3b8;
    --border: #e2e8f0; --border-light: #f1f5f9;
    --accent: #6366f1; --accent-hover: #4f46e5; --accent-light: #eef2ff;
    --card-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --card-shadow-hover: 0 4px 12px rgba(0,0,0,0.08);
    --input-bg: #ffffff; --input-border: #d1d5db;
    --sidebar-bg: #ffffff; --topbar-bg: #ffffff;
    --scrollbar-track: #f1f5f9; --scrollbar-thumb: #cbd5e1;
    --overlay: rgba(0,0,0,0.4);
  }

  /* ─── Dark Theme ─── */
  .dark {
    --bg-primary: #0f172a; --bg-secondary: #1e293b; --bg-tertiary: #334155;
    --bg-hover: #334155; --bg-active: #475569;
    --text-primary: #f1f5f9; --text-secondary: #94a3b8; --text-tertiary: #64748b;
    --border: #334155; --border-light: #1e293b;
    --accent: #818cf8; --accent-hover: #6366f1; --accent-light: #1e1b4b;
    --card-shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
    --card-shadow-hover: 0 4px 12px rgba(0,0,0,0.4);
    --input-bg: #1e293b; --input-border: #475569;
    --sidebar-bg: #1e293b; --topbar-bg: #1e293b;
    --scrollbar-track: #1e293b; --scrollbar-thumb: #475569;
    --overlay: rgba(0,0,0,0.6);
  }

  * { font-family: 'Inter', -apple-system, sans-serif; box-sizing: border-box; }
  body { background: var(--bg-primary); color: var(--text-primary); margin: 0; transition: background 0.3s, color 0.3s; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

  /* ─── Components ─── */
  .pipeline-col { min-width: 260px; max-height: calc(100vh - 200px); overflow-y: auto; }
  .card-drag { cursor: grab; transition: all 0.15s; }
  .card-drag:hover { transform: translateY(-2px); box-shadow: var(--card-shadow-hover); }
  .modal-overlay { background: var(--overlay); backdrop-filter: blur(4px); }
  .stat-card { background: var(--bg-secondary); border: 1px solid var(--border); box-shadow: var(--card-shadow); border-radius: 12px; }
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; }

  input, textarea, select {
    background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-primary);
    border-radius: 8px; padding: 8px 12px; transition: border-color 0.15s, box-shadow 0.15s;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }

  .overdue { animation: pulse-red 2s infinite; }
  @keyframes pulse-red { 0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 50% { box-shadow: 0 0 0 4px rgba(239,68,68,0); } }

  .trigger-badge { font-size: 9px; padding: 1px 6px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }
  .trigger-overdue { background: #fef2f2; color: #dc2626; }
  .trigger-stale { background: #fffbeb; color: #d97706; }
  .trigger-scheduled { background: #f0fdf4; color: #16a34a; }
  .dark .trigger-overdue { background: #450a0a; color: #fca5a5; }
  .dark .trigger-stale { background: #451a03; color: #fcd34d; }
  .dark .trigger-scheduled { background: #052e16; color: #86efac; }

  .sidebar-item { transition: all 0.15s; cursor: pointer; padding: 10px 16px; border-radius: 8px; display: flex; align-items: center; gap: 10px; color: var(--text-secondary); }
  .sidebar-item:hover { background: var(--bg-hover); color: var(--text-primary); }
  .sidebar-item.active { background: var(--accent); color: white; }
  .drag-over { background: var(--accent-light) !important; border: 2px dashed var(--accent) !important; }
  .tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 500; background: var(--accent-light); color: var(--accent); }

  .detail-panel { width: 420px; border-left: 1px solid var(--border); background: var(--bg-secondary); transition: width 0.2s; overflow-y: auto; flex-shrink: 0; }
  .detail-panel-enter { animation: slideIn 0.2s ease-out; }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  .quick-action { opacity: 0; transition: opacity 0.15s; }
  tr:hover .quick-action, .pipeline-card:hover .quick-action { opacity: 1; }
  .funnel-bar { transition: width 0.4s ease-out; min-width: 2px; }

  .kbd { display: inline-flex; align-items: center; justify-content: center; min-width: 22px; height: 22px; padding: 0 6px;
    background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 4px; font-size: 11px; font-family: monospace; color: var(--text-secondary); box-shadow: 0 1px 0 var(--border); }
  .shortcut-overlay { position: fixed; inset: 0; z-index: 100; background: var(--overlay); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; }
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 10px; max-width: min(420px, calc(100vw - 32px)); pointer-events: none; }
  .toast { pointer-events: auto; padding: 12px 18px 12px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15); animation: toastIn 0.25s ease-out; display: flex; align-items: flex-start; gap: 10px;
    background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border); }
  .toast-info { border-left: 4px solid var(--accent); }
  .toast-success { border-left: 4px solid #10b981; }
  .toast-error { border-left: 4px solid #ef4444; }
  .toast-warn { border-left: 4px solid #f59e0b; }
  .toast-icon { flex-shrink: 0; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-weight: 700; border-radius: 50%; font-size: 13px; }
  .toast-info .toast-icon { background: var(--accent-light); color: var(--accent); }
  .toast-success .toast-icon { background: #dcfce7; color: #065f46; }
  .toast-error .toast-icon { background: #fee2e2; color: #b91c1c; }
  .toast-warn .toast-icon { background: #fef3c7; color: #92400e; }
  @keyframes toastIn { from { transform: translateY(12px) scale(0.96); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

  /* ─── Confirm dialog ─── */
  .confirm-overlay { position: fixed; inset: 0; z-index: 300; background: var(--overlay); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.15s ease-out; }
  .confirm-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.25); max-width: 420px; width: 100%; padding: 28px; animation: confirmIn 0.18s ease-out; }
  .confirm-title { font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
  .confirm-body { font-size: 14px; color: var(--text-secondary); line-height: 1.55; margin-bottom: 24px; }
  .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .confirm-btn { padding: 10px 18px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; border: none; transition: opacity 0.15s, background 0.15s; }
  .confirm-btn-cancel { background: var(--bg-tertiary); color: var(--text-primary); }
  .confirm-btn-cancel:hover { background: var(--bg-active); }
  .confirm-btn-ok { background: var(--accent); color: white; }
  .confirm-btn-ok:hover { opacity: 0.9; }
  .confirm-btn-danger { background: #ef4444; color: white; }
  .confirm-btn-danger:hover { background: #dc2626; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes confirmIn { from { transform: scale(0.96) translateY(4px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

  /* ─── Skeleton loading ─── */
  .skeleton { background: linear-gradient(90deg, var(--bg-tertiary) 0%, var(--bg-hover) 50%, var(--bg-tertiary) 100%); background-size: 200% 100%; border-radius: 6px; animation: skeletonShimmer 1.4s linear infinite; }
  @keyframes skeletonShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .skeleton-text { height: 14px; margin: 6px 0; }
  .skeleton-title { height: 20px; margin: 8px 0; }
  .skeleton-block { height: 80px; border-radius: 12px; }
  .skeleton-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }

  /* ─── Empty state ─── */
  .empty-state { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 48px 24px; max-width: 420px; margin: 40px auto; }
  .empty-state-icon { width: 72px; height: 72px; border-radius: 18px; background: var(--accent-light); color: var(--accent); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
  .empty-state-title { font-size: 18px; font-weight: 700; color: var(--text-primary); margin: 0 0 8px; }
  .empty-state-body { font-size: 14px; color: var(--text-secondary); line-height: 1.55; margin: 0 0 24px; }
  .empty-state-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .empty-state-cta { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: opacity 0.15s; }
  .empty-state-cta:hover { opacity: 0.9; }
  .empty-state-secondary { padding: 10px 20px; background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; }
  .empty-state-secondary:hover { background: var(--bg-hover); }

  /* ─── Onboarding tour ─── */
  .tour-backdrop { position: fixed; inset: 0; z-index: 400; background: rgba(0,0,0,0.55); animation: fadeIn 0.2s ease-out; pointer-events: auto; }
  .tour-card { position: fixed; z-index: 401; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 20px 50px rgba(0,0,0,0.35); padding: 20px; max-width: 320px; animation: confirmIn 0.2s ease-out; }
  .tour-step { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .tour-title { font-size: 16px; font-weight: 700; color: var(--text-primary); margin: 0 0 6px; }
  .tour-body { font-size: 13px; color: var(--text-secondary); line-height: 1.55; margin: 0 0 16px; }
  .tour-actions { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .tour-skip { background: none; border: none; color: var(--text-tertiary); font-size: 12px; cursor: pointer; padding: 6px 10px; }
  .tour-skip:hover { color: var(--text-secondary); }
  .tour-next { padding: 8px 16px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; }
  .tour-next:hover { opacity: 0.9; }

  /* Dark mode overrides for Tailwind utility classes */
  .dark .bg-white { background: var(--bg-secondary) !important; }
  .dark .bg-gray-50 { background: var(--bg-tertiary) !important; }
  .dark .bg-gray-100 { background: var(--bg-tertiary) !important; }
  .dark .border { border-color: var(--border) !important; }
  .dark .border-t { border-color: var(--border) !important; }
  .dark .border-b { border-color: var(--border) !important; }
  .dark .border-r { border-color: var(--border) !important; }
  .dark .border-l { border-color: var(--border) !important; }
  .dark .text-gray-600 { color: var(--text-secondary) !important; }
  .dark .text-gray-500 { color: var(--text-secondary) !important; }
  .dark .text-gray-400 { color: var(--text-tertiary) !important; }
  .dark .text-gray-300 { color: var(--text-tertiary) !important; }
  .dark .text-gray-700 { color: var(--text-primary) !important; }
  .dark .text-gray-800 { color: var(--text-primary) !important; }
  .dark .hover\:bg-gray-50:hover { background: var(--bg-hover) !important; }
  .dark .hover\:bg-gray-200:hover { background: var(--bg-active) !important; }
  .dark table thead { background: var(--bg-tertiary) !important; }
  .dark table tbody tr { border-color: var(--border) !important; }
  .dark table tbody tr:hover { background: var(--bg-hover) !important; }

  /* Dark mode soft-color overrides */
  .dark .bg-red-50, .dark .bg-red-100 { background: #450a0a !important; }
  .dark .bg-green-50, .dark .bg-green-100 { background: #052e16 !important; }
  .dark .bg-blue-50, .dark .bg-blue-100 { background: #172554 !important; }
  .dark .bg-yellow-50, .dark .bg-yellow-100 { background: #422006 !important; }
  .dark .bg-orange-50 { background: #431407 !important; }
  .dark .bg-indigo-50 { background: #1e1b4b !important; }
  .dark .bg-purple-50 { background: #2e1065 !important; }
  .dark .bg-amber-50 { background: #451a03 !important; }
  .dark .border-red-200 { border-color: #7f1d1d !important; }
  .dark .border-green-200 { border-color: #14532d !important; }
  .dark .border-blue-200 { border-color: #1e3a5f !important; }
  .dark .border-amber-200 { border-color: #78350f !important; }
  .dark .border-orange-200 { border-color: #7c2d12 !important; }

  /* ─── Dark mode toggle button ─── */
  .theme-toggle { position: relative; width: 44px; height: 24px; border-radius: 12px; border: none; cursor: pointer;
    background: var(--bg-tertiary); border: 1px solid var(--border); transition: background 0.3s; padding: 0; }
  .theme-toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); transition: transform 0.3s; }
  .dark .theme-toggle::after { transform: translateX(20px); }

  /* ─── Mobile Responsive ─── */
  @media (max-width: 768px) {
    .desktop-sidebar { display: none !important; }
    .mobile-bottom-nav { display: flex !important; }
    .detail-panel { position: fixed; inset: 0; width: 100% !important; z-index: 60; border-left: none; }
    .detail-panel-enter { animation: slideUp 0.25s ease-out; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .desktop-topbar .backup-text { display: none; }
    .desktop-topbar .kbd { display: none; }
    .main-content { padding: 12px !important; padding-bottom: 72px !important; }
    .stat-card { padding: 12px !important; }
    .stat-card .text-3xl { font-size: 1.5rem !important; }
    .contact-table { display: none !important; }
    .contact-cards-mobile { display: block !important; }
    .quick-action { opacity: 1 !important; }
    .pipeline-col { min-width: 200px !important; }
    .toast { bottom: 80px; left: 16px; right: 16px; text-align: center; }
    .shortcut-overlay { display: none !important; }
    .funnel-label { width: 80px !important; }
    .funnel-value { width: 60px !important; }
  }
  @media (min-width: 769px) {
    .mobile-bottom-nav { display: none !important; }
    .contact-cards-mobile { display: none !important; }
  }
  .mobile-bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: var(--bg-secondary); border-top: 1px solid var(--border);
    padding: 4px 0; padding-bottom: env(safe-area-inset-bottom, 4px);
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .mobile-tab { display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 6px 8px; min-width: 56px; border-radius: 8px; font-size: 10px; color: var(--text-tertiary); cursor: pointer;
    -webkit-tap-highlight-color: transparent; }
  .mobile-tab.active { color: var(--accent); background: var(--accent-light); }
  .mobile-tab span:first-child { font-size: 18px; line-height: 1; }
  .mobile-more-overlay { position: fixed; inset: 0; z-index: 55; background: var(--overlay); backdrop-filter: blur(4px); display: flex; align-items: flex-end; }
  .mobile-more-sheet { background: var(--bg-secondary); border-top-left-radius: 16px; border-top-right-radius: 16px;
    width: 100%; padding: 16px 16px calc(16px + env(safe-area-inset-bottom)); box-shadow: 0 -8px 24px rgba(0,0,0,0.15);
    animation: sheetUp 0.2s ease-out; max-height: 70vh; overflow-y: auto; }
  .mobile-more-handle { width: 36px; height: 4px; background: var(--border); border-radius: 999px; margin: 0 auto 16px; }
  .mobile-more-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; cursor: pointer;
    color: var(--text-primary); font-size: 15px; -webkit-tap-highlight-color: transparent; }
  .mobile-more-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  /* ─── Login Screen ─── */
